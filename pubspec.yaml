name: vaultix
description: "Vaultix - App Lock & Focus"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.4
  flutter_local_notifications: ^18.0.1
  provider: ^6.1.2
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/vaultix_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
